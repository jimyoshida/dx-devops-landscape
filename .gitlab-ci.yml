image: jimyoshida/node-make-extra:node22

stages:
  - test
  - deploy

test:
  stage: test
  script:
  - cd website
  - yarn install
  - make 
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  variables:
    # GitLab Pages serves this project at the domain root, so assets must be
    # referenced from '/'. $CI_PAGES_URL is the full URL GitLab serves from.
    BASE_URL: "/"
    SITE_URL: "$CI_PAGES_URL"
  script:
  - cd website
  - yarn install
  - make
  - mv ./build ../public
  artifacts:
    paths:
    - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
